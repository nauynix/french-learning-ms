<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="basic.css" rel="stylesheet">
    <style type="text/css">
        /* Page specific styles */
        .search-input {
            width: 25em;
            font-size: 1.4em;
            padding: 0.4em;
        }
    </style>
    <title>Multisearch French for Language Learning</title>
</head>

<body>
    <main>
        <h1>Multisearch French Words</h1>
        <p>This site searches words in French to help an English speaker build flash cards by searching:</p>
        <ul>
            <li>Linguee: For translation and example</li>
            <li>French Wiktionary: For word sounds</li>
            <li>Google Images: Get images to choose to build the flash card</li>
        </ul>
        </article>
        <input type="text" class="search-input" id="searchInputId" autofocus placeholder="Multisearch here">
    </main>
    <script>
        var searchInput = document.getElementById("searchInputId");
        searchInput.addEventListener("keyup", function (event) {
            if (event.keyCode === 13) {
                event.preventDefault();
                var searchQuery = encodeURIComponent(document.getElementById("searchInputId").value);
                window.open("https://www.google.com/search?q=" + searchQuery + "&tbm=isch&hl=fr");
                window.open("https://www.linguee.com/english-french/search?source=french&query=" + searchQuery);
                window.open("https://fr.wiktionary.org/wiki/" + searchQuery);
                document.getElementById("searchInputId").value = "";
            }
        });
    </script>
</body>

</html>
