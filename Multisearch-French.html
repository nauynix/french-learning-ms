<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="basic.css" rel="stylesheet">
    <style type="text/css">
        .search-input {
            width: 25em;
            font-size: 1.4em;
            padding: 0.4em;
        }
        #loading {
            margin-top: 1em;
            display: none;
        }
        .result-section {
            margin-top: 1.2em;
            padding: 1em;
            background: var(--c2);
            border-radius: var(--rc);
        }
        .result-section h2 {
            margin-top: 0;
            font-size: 1.2em;
            font-weight: bold;
        }
        .translation-word {
            font-size: 1.8em;
            font-weight: bold;
        }
        .translation-options {
            margin-top: 0.6em;
        }
        .translation-option {
            display: inline-block;
            cursor: pointer;
            background: var(--c1);
            color: var(--c5);
            border: none;
            border-radius: var(--rc);
            padding: 0.3em 0.7em;
            margin: 0.2em 0.3em 0.2em 0;
            font-size: 1em;
        }
        .translation-option:hover { opacity: 0.8; }
        .translation-option.selected {
            outline: 3px solid var(--c4);
        }
        .translation-gloss {
            font-size: 0.85em;
            opacity: 0.8;
        }
        .ipa {
            font-size: 1.3em;
            margin-right: 0.5em;
        }
        .btn {
            cursor: pointer;
            background: var(--c1);
            color: var(--c5);
            border: none;
            border-radius: var(--rc);
            padding: 0.4em 0.8em;
            margin-right: 0.4em;
            font-size: 1em;
        }
        .btn:hover { opacity: 0.8; }
        .example-list {
            list-style: none;
            padding: 0;
        }
        .example-list li {
            margin: 0.6em 0;
            padding: 0.5em;
            border-left: 3px solid var(--c1);
            padding-left: 0.8em;
        }
        .example-fr {
            color: var(--c1);
            font-weight: bold;
        }
        .example-en {
            font-style: italic;
            opacity: 0.8;
        }
        .example-actions {
            margin-top: 0.3em;
        }
        .example-actions .btn {
            font-size: 0.85em;
            padding: 0.2em 0.6em;
        }
        .example-image {
            margin-top: 0.4em;
        }
        .example-image img {
            height: 150px;
            border-radius: var(--rc);
        }
        .example-image .generating {
            display: inline-block;
            padding: 0.3em 0.6em;
            font-size: 0.85em;
            opacity: 0.6;
        }
        #results { display: none; }
        #settings {
            margin-top: 1em;
            padding: 0.8em;
            background: var(--c2);
            border-radius: var(--rc);
        }
        #settings summary {
            cursor: pointer;
            font-weight: bold;
        }
        #settings input {
            width: 20em;
            margin-top: 0.4em;
        }
        .lang-toggle {
            display: inline-flex;
            margin-bottom: 0.6em;
        }
        .lang-toggle button {
            cursor: pointer;
            background: var(--c2);
            color: var(--c4);
            border: none;
            padding: 0.4em 1em;
            font-size: 1em;
        }
        .lang-toggle button:first-child {
            border-radius: var(--rc) 0 0 var(--rc);
        }
        .lang-toggle button:last-child {
            border-radius: 0 var(--rc) var(--rc) 0;
        }
        .lang-toggle button.active {
            background: var(--c1);
            color: var(--c5);
        }
    </style>
    <title>French Flashcard Builder</title>
</head>

<body>
    <main>
        <h1>French Flashcard Builder</h1>
        <p>Type an English word to get its French translation, pronunciation, example sentences, and images.</p>
        <div class="lang-toggle">
            <button id="langEn" class="active" onclick="setLang('en')">English</button>
            <button id="langFr" onclick="setLang('fr')">French</button>
        </div>
        <br>
        <input type="text" class="search-input" id="searchInputId" autofocus placeholder="Type an English word...">
        <div id="loading">Searching...</div>

        <details id="settings">
            <summary>Settings</summary>
            <label>Hugging Face Token (for AI images):<br>
                <input type="password" id="hfToken" placeholder="hf_..." oninput="localStorage.setItem('hfToken', this.value)">
            </label>
            <p style="font-size:0.85em;opacity:0.7">Free at <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>. Stored in your browser only.</p>
        </details>

        <div id="results">
            <div class="result-section" id="translationSection"></div>
            <div class="result-section" id="pronunciationSection"></div>
            <div class="result-section" id="examplesSection"></div>
        </div>
    </main>

    <script>
        var WIKT_API = "https://en.wiktionary.org/w/api.php?action=parse&prop=text&format=json&origin=*&page=";
        var LINGVA_API = "https://lingva.ml/api/v1/";
        var TATOEBA_API = "https://api.tatoeba.org/unstable/sentences?lang=fra&limit=20&sort=random&q=";

        var currentEnglishWord = "";
        var inputLang = "en";
        var HF_API = "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0";

        // Load saved HF token
        (function () {
            var saved = localStorage.getItem("hfToken");
            if (saved) document.getElementById("hfToken").value = saved;
        })();

        function setLang(lang) {
            inputLang = lang;
            document.getElementById("langEn").classList.toggle("active", lang === "en");
            document.getElementById("langFr").classList.toggle("active", lang === "fr");
            document.getElementById("searchInputId").placeholder = lang === "en" ? "Type an English word..." : "Type a French word or sentence...";
        }

        function searchFrenchSentence(sentence) {
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";
            document.getElementById("translationSection").innerHTML = "";
            document.getElementById("pronunciationSection").innerHTML = "";
            document.getElementById("examplesSection").innerHTML = "";
            document.getElementById("imagesSection").innerHTML = "";

            // Translate to English and generate audio in parallel
            Promise.all([
                fetch(LINGVA_API + "fr/en/" + encodeURIComponent(sentence))
                    .then(function (r) { return r.json(); })
                    .then(function (data) { return data.translation || null; })
                    .catch(function () { return null; }),
                fetchLingvaAudio(sentence)
                    .then(function (blob) { return URL.createObjectURL(blob); })
                    .catch(function () { return null; })
            ]).then(function (results) {
                var englishText = results[0];
                var audioUrl = results[1];

                var transHtml = "<h2>Sentence</h2>";
                transHtml += '<div class="example-fr" style="font-size:1.4em">' + escapeHtml(sentence) + '</div>';
                if (englishText) transHtml += '<div class="example-en" style="font-size:1.1em">' + escapeHtml(englishText) + '</div>';
                document.getElementById("translationSection").innerHTML = transHtml;

                var pronHtml = "<h2>Pronunciation</h2>";
                if (audioUrl) {
                    pronHtml += '<button class="btn" onclick="document.getElementById(\'sentenceAudio\').play()">&#9654; Listen</button>';
                    pronHtml += '<button class="btn" onclick="downloadSentence(\'' + escapeHtml(sentence).replace(/'/g, "\\'") + '\')">&#11015; Download mp3</button>';
                    pronHtml += '<audio id="sentenceAudio" src="' + audioUrl + '"></audio>';
                } else {
                    pronHtml += "<p>Audio generation failed.</p>";
                }
                document.getElementById("pronunciationSection").innerHTML = pronHtml;

                document.getElementById("examplesSection").innerHTML = "";
                document.getElementById("imagesSection").innerHTML = "";
                document.getElementById("results").style.display = "block";
                document.getElementById("loading").style.display = "none";
            });
        }

        function searchFrenchWord(frenchWord) {
            currentEnglishWord = frenchWord;
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";
            document.getElementById("translationSection").innerHTML = "";
            document.getElementById("pronunciationSection").innerHTML = "";
            document.getElementById("examplesSection").innerHTML = "";
            document.getElementById("imagesSection").innerHTML = "";

            // Get English translation via Lingva (reverse)
            fetch(LINGVA_API + "fr/en/" + encodeURIComponent(frenchWord))
                .then(function (r) { return r.json(); })
                .then(function (data) { return data.translation || null; })
                .catch(function () { return null; })
                .then(function (englishWord) {
                    var transHtml = "<h2>Translation</h2>";
                    transHtml += '<div class="translation-word">' + escapeHtml(frenchWord);
                    if (englishWord) transHtml += ' &rarr; ' + escapeHtml(englishWord);
                    transHtml += '</div>';
                    document.getElementById("translationSection").innerHTML = transHtml;
                    document.getElementById("results").style.display = "block";
                    document.getElementById("loading").style.display = "none";

                    var pronWord = frenchWord.toLowerCase().split(/[\s,]+/)[0];
                    fetchPronunciation(pronWord);
                    fetchExamples(pronWord);
                    // Images generated per example sentence
                });
        }

        function searchWord(word) {
            currentEnglishWord = word;
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";
            document.getElementById("translationSection").innerHTML = "";
            document.getElementById("pronunciationSection").innerHTML = "";
            document.getElementById("examplesSection").innerHTML = "";
            document.getElementById("imagesSection").innerHTML = "";

            // Fetch Lingva translation and Wiktionary translations in parallel
            Promise.all([
                fetch(LINGVA_API + "en/fr/" + encodeURIComponent(word))
                    .then(function (r) { return r.json(); })
                    .then(function (data) { return data.translation || null; })
                    .catch(function () { return null; }),
                fetchWiktionaryTranslations(word)
            ]).then(function (results) {
                var lingvaWord = results[0];
                var wiktOptions = results[1]; // [{word, gloss}]

                // Build unique translation options: Lingva first, then Wiktionary
                var options = [];
                var seen = {};
                if (lingvaWord) {
                    var lw = lingvaWord.toLowerCase();
                    seen[lw] = true;
                    options.push({ word: lingvaWord, gloss: "" });
                }
                wiktOptions.forEach(function (opt) {
                    var key = opt.word.toLowerCase();
                    if (!seen[key]) {
                        seen[key] = true;
                        options.push(opt);
                    } else if (opt.gloss) {
                        // Add gloss to existing entry if it didn't have one
                        for (var i = 0; i < options.length; i++) {
                            if (options[i].word.toLowerCase() === key && !options[i].gloss) {
                                options[i].gloss = opt.gloss;
                                break;
                            }
                        }
                    }
                });

                renderTranslations(word, options);
                document.getElementById("results").style.display = "block";
                document.getElementById("loading").style.display = "none";

                // Select the first option by default
                if (options.length > 0) {
                    selectTranslation(options[0].word);
                } else {
                    document.getElementById("translationSection").innerHTML = "<h2>Translation</h2><p>No translation found.</p>";
                }
            });
        }

        function fetchWiktionaryTranslations(word) {
            return fetch(WIKT_API + encodeURIComponent(word))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.parse || !data.parse.text) return [];
                    var doc = new DOMParser().parseFromString(data.parse.text["*"], "text/html");
                    var tables = doc.querySelectorAll("[data-gloss]");
                    var options = [];
                    var seen = {};
                    tables.forEach(function (t) {
                        var gloss = t.getAttribute("data-gloss");
                        var frSpans = t.querySelectorAll('span[lang="fr"]');
                        frSpans.forEach(function (s) {
                            var w = s.textContent.trim();
                            if (w && w.length < 30) {
                                var key = w.toLowerCase();
                                if (!seen[key]) {
                                    seen[key] = true;
                                    options.push({ word: w, gloss: gloss });
                                }
                            }
                        });
                    });
                    return options;
                })
                .catch(function () { return []; });
        }

        function renderTranslations(englishWord, options) {
            var section = document.getElementById("translationSection");
            var html = "<h2>Translation</h2>";
            html += '<div class="translation-word" id="selectedTranslation">' + escapeHtml(englishWord) + ' &rarr; ' + escapeHtml(options[0] ? options[0].word : "?") + '</div>';
            if (options.length > 1) {
                html += '<div class="translation-options">';
                options.forEach(function (opt) {
                    html += '<button class="translation-option" data-word="' + escapeHtml(opt.word) + '" onclick="selectTranslation(\'' + escapeHtml(opt.word).replace(/'/g, "\\'") + '\')">';
                    html += escapeHtml(opt.word);
                    if (opt.gloss) html += ' <span class="translation-gloss">(' + escapeHtml(opt.gloss) + ')</span>';
                    html += '</button>';
                });
                html += '</div>';
            }
            section.innerHTML = html;
            // Mark first as selected
            var firstBtn = section.querySelector('.translation-option');
            if (firstBtn) firstBtn.classList.add('selected');
        }

        function selectTranslation(frenchWord) {
            // Update selected button style
            var buttons = document.querySelectorAll('.translation-option');
            buttons.forEach(function (b) {
                b.classList.toggle('selected', b.getAttribute('data-word') === frenchWord);
            });

            // Update the main translation display
            var display = document.getElementById('selectedTranslation');
            if (display) display.innerHTML = escapeHtml(currentEnglishWord) + ' &rarr; ' + escapeHtml(frenchWord);

            // Re-fetch pronunciation and examples for the selected word
            var pronWord = frenchWord.toLowerCase().split(/[\s,]+/)[0];
            fetchPronunciation(pronWord);
            fetchExamples(pronWord);
        }

        function fetchExamples(frenchWord) {
            var section = document.getElementById("examplesSection");
            section.innerHTML = "<h2>Examples</h2><p>Loading...</p>";

            // Search Tatoeba for French sentences containing the word
            fetch(TATOEBA_API + encodeURIComponent('"' + frenchWord + '"'))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.data) throw new Error("No data");
                    // Filter for real sentences (5+ words, not too long)
                    var sentences = data.data
                        .filter(function (s) {
                            var wc = s.text.split(/\s+/).length;
                            return wc >= 4 && s.text.length < 150;
                        })
                        .slice(0, 5);

                    if (sentences.length === 0) throw new Error("No sentences");

                    var html = "<h2>Examples</h2><ul class='example-list'>";
                    sentences.forEach(function (s, i) {
                        html += '<li><div class="example-fr">' + escapeHtml(s.text) + '</div><div class="example-en" data-fr="' + escapeHtml(s.text) + '">translating...</div><div class="example-actions"><button class="btn" onclick="playSentence(this, \'' + escapeHtml(s.text).replace(/'/g, "\\'") + '\')">&#9654; Listen</button> <button class="btn" onclick="downloadSentence(\'' + escapeHtml(s.text).replace(/'/g, "\\'") + '\')">&#11015; Download mp3</button></div><div class="example-image" id="exImg' + i + '"><span class="generating"></span></div></li>';
                    });
                    html += "</ul>";
                    section.innerHTML = html;

                    // Translate each French sentence to English via Lingva, then generate image
                    sentences.forEach(function (s, i) {
                        fetch(LINGVA_API + "fr/en/" + encodeURIComponent(s.text))
                            .then(function (r) { return r.json(); })
                            .then(function (d) {
                                var enDivs = section.querySelectorAll(".example-en");
                                if (d.translation && enDivs[i]) {
                                    enDivs[i].textContent = d.translation;
                                    // Generate image based on English translation
                                    var imgContainer = document.getElementById("exImg" + i);
                                    if (imgContainer) {
                                        generateImage("simple illustration: " + d.translation, imgContainer.querySelector("span"));
                                    }
                                }
                            })
                            .catch(function () {});
                    });
                })
                .catch(function () {
                    section.innerHTML = "<h2>Examples</h2><p>No example sentences found.</p>";
                });
        }

        function fetchPronunciation(frenchWord) {
            var section = document.getElementById("pronunciationSection");
            section.innerHTML = "<h2>Pronunciation</h2><p>Loading...</p>";

            fetch(WIKT_API + encodeURIComponent(frenchWord))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.parse || !data.parse.text) throw new Error("No data");
                    var doc = new DOMParser().parseFromString(data.parse.text["*"], "text/html");

                    var frenchH2 = doc.querySelector("h2#French");
                    if (!frenchH2) throw new Error("No French section");
                    var frenchDiv = frenchH2.closest(".mw-heading2") || frenchH2.parentElement;

                    var ipas = [];
                    var audioSrc = null;
                    var el = frenchDiv.nextElementSibling;
                    while (el) {
                        if (el.classList && el.classList.contains("mw-heading2")) break;
                        el.querySelectorAll(".IPA").forEach(function (i) {
                            var t = i.textContent.trim();
                            if (t && ipas.indexOf(t) === -1) ipas.push(t);
                        });
                        if (!audioSrc) {
                            // Prefer mp3 over ogg (iOS doesn't support ogg)
                            var mp3Src = el.querySelector('audio source[type="audio/mpeg"], a[href*=".mp3"]');
                            if (mp3Src) {
                                audioSrc = mp3Src.getAttribute("src") || mp3Src.getAttribute("href");
                            } else {
                                var anySrc = el.querySelector("audio source, a[href*='.ogg']");
                                if (anySrc) audioSrc = anySrc.getAttribute("src") || anySrc.getAttribute("href");
                            }
                        }
                        el = el.nextElementSibling;
                    }

                    var html = "<h2>Pronunciation</h2>";
                    if (ipas.length > 0) {
                        html += '<span class="ipa">' + escapeHtml(ipas[0]) + '</span>';
                    }
                    if (audioSrc) {
                        if (audioSrc.startsWith("//")) audioSrc = "https:" + audioSrc;
                        // Convert ogg URLs to mp3 (Wikimedia always has transcoded mp3 versions)
                        if (audioSrc.match(/\/commons\/[0-9a-f]\/[0-9a-f]{2}\/.*\.ogg$/)) {
                            audioSrc = audioSrc.replace(/\/commons\//, "/commons/transcoded/") + "/" + audioSrc.split("/").pop() + ".mp3";
                        }
                        html += '<button class="btn" onclick="document.getElementById(\'pronAudio\').play()">&#9654; Play</button>';
                        html += '<button class="btn" onclick="downloadAudio(\'' + audioSrc + '\', \'' + escapeHtml(frenchWord) + '\')">&#11015; Download</button>';
                        html += '<audio id="pronAudio" src="' + audioSrc + '"></audio>';
                    }
                    if (ipas.length === 0 && !audioSrc) {
                        html += "<p>No pronunciation data found.</p>";
                    }
                    html += '<br><a href="https://en.wiktionary.org/wiki/' + encodeURIComponent(frenchWord) + '#French" target="_blank" rel="noopener">Open Wiktionary</a>';
                    section.innerHTML = html;

                    // Auto-download the audio
                    if (audioSrc) downloadAudio(audioSrc, frenchWord);
                })
                .catch(function () {
                    section.innerHTML = "<h2>Pronunciation</h2><p>No pronunciation data found for this word.</p>";
                });
        }

        function fetchLingvaAudio(text) {
            return fetch(LINGVA_API + "audio/fr/" + encodeURIComponent(text))
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data.audio) throw new Error("No audio");
                    var bytes = new Uint8Array(data.audio);
                    return new Blob([bytes], { type: "audio/mpeg" });
                });
        }

        function playSentence(btn, text) {
            btn.textContent = "...";
            fetchLingvaAudio(text).then(function (blob) {
                var url = URL.createObjectURL(blob);
                var audio = new Audio(url);
                audio.play();
                audio.onended = function () { URL.revokeObjectURL(url); };
                btn.textContent = "\u25B6 Listen";
            }).catch(function () {
                btn.textContent = "\u25B6 Listen";
            });
        }

        function downloadSentence(text) {
            fetchLingvaAudio(text).then(function (blob) {
                var slug = text.substring(0, 40).replace(/[^a-zA-ZÀ-ÿ0-9 ]/g, "").replace(/\s+/g, "_");
                var a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = slug + ".mp3";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            });
        }

        function downloadAudio(url, word) {
            fetch(url)
                .then(function (r) { return r.blob(); })
                .then(function (blob) {
                    var ext = ".mp3";
                    var a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = word + ext;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);
                });
        }


        function generateImage(prompt, imgEl) {
            var token = localStorage.getItem("hfToken");
            if (!token) {
                imgEl.parentElement.innerHTML = '<span class="generating">Set HF token in Settings for AI images</span>';
                return;
            }
            imgEl.parentElement.innerHTML = '<span class="generating">Generating image...</span>';
            fetch(HF_API, {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: prompt, parameters: { width: 512, height: 512 } })
            })
            .then(function (r) {
                if (!r.ok) throw new Error("HF API error " + r.status);
                return r.blob();
            })
            .then(function (blob) {
                var url = URL.createObjectURL(blob);
                imgEl.parentElement.innerHTML = '<img src="' + url + '" alt="' + escapeHtml(prompt) + '">';
            })
            .catch(function (e) {
                imgEl.parentElement.innerHTML = '<span class="generating">Image failed: ' + escapeHtml(e.message) + '</span>';
            });
        }

        function escapeHtml(text) {
            var div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // Search on Enter
        var searchInput = document.getElementById("searchInputId");
        searchInput.addEventListener("keyup", function (event) {
            if (event.keyCode === 13) {
                event.preventDefault();
                var word = searchInput.value.trim();
                if (word) {
                    if (inputLang === "fr") {
                        if (word.indexOf(" ") !== -1) searchFrenchSentence(word);
                        else searchFrenchWord(word);
                    } else {
                        searchWord(word);
                    }
                }
                searchInput.value = "";
            }
        });
    </script>
</body>

</html>
